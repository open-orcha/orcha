name: build-check

on:
  pull_request:
    paths:
      - "orcha-cli/**"
      - "packaging/**"
      - ".github/workflows/build-check.yml"

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # GitHub-hosted runner: free + unlimited minutes for public repos.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist + wheel, twine check, wheel smoke test
        run: |
          python -m pip install --upgrade pip build twine
          python -m build orcha-cli --outdir dist
          twine check dist/*
          python -m venv .smoke-venv
          ./.smoke-venv/bin/pip install dist/*.whl
          ./.smoke-venv/bin/orcha --version

      - name: Clean up
        if: always()
        run: rm -rf .smoke-venv dist
