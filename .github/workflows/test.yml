name: tests

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run for the same ref when a newer commit is pushed.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    # GitHub-hosted runner: free + unlimited minutes for public repos.
    runs-on: ubuntu-latest

    # Postgres as a service container (Linux-only, which is fine here). The test
    # suite (tests/conftest.py) reads these URLs, creates a dedicated orcha_test
    # database, and truncates between tests so it never touches a real stack.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orcha
          POSTGRES_PASSWORD: orcha
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orcha"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ORCHA_TEST_ADMIN_URL: postgresql://orcha:orcha@localhost:5432/postgres
      ORCHA_TEST_DATABASE_URL: postgresql://orcha:orcha@localhost:5432/orcha_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt \
                      -r orcha-cli/orcha_cli/templates/portal/requirements.txt \
                      pytest-cov

      - name: Run state-machine tests + coverage gate (>=70% of main.py)
        run: |
          pytest --cov=main --cov-report=term-missing --cov-fail-under=70

      - name: Coverage summary (PR)
        if: always()
        run: |
          pytest --cov=main --cov-report=term | tail -5 >> "$GITHUB_STEP_SUMMARY" || true
