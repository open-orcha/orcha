appId: io.openorcha.desktop
productName: Orcha
copyright: Copyright © 2026 Orcha

# What goes inside the .app bundle. electron-vite emits everything to out/;
# the renderer bundles its own deps, and main/preload have no external runtime
# deps, so we only ship out/ + package.json (electron-builder needs the latter
# to resolve "main").
files:
  - out/**/*
  - package.json

# The onboarding flow lays down a project's Orcha stack from these templates
# (compose, migrations, portal, skills, prefs) WITHOUT the orcha CLI installed.
# They are copied from the CLI at build time (scripts/copy-orcha-templates.mjs,
# run by the predist hooks) and shipped here so templatesRoot() resolves them at
# Contents/Resources/orcha-templates (= process.resourcesPath) in the packaged app.
extraResources:
  - from: resources/orcha-templates
    to: orcha-templates

directories:
  output: dist
  buildResources: resources

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.png
  # Signed with a Developer ID Application certificate and notarized by Apple,
  # so Gatekeeper opens the app on a normal double-click — no right-click→Open
  # or xattr/quarantine workaround needed. Credentials are supplied via
  # environment variables and are NEVER committed:
  #   CSC_LINK / CSC_KEY_PASSWORD ............ the .p12 cert + its password
  #   APPLE_API_KEY / _KEY_ID / _ISSUER ...... App Store Connect key (notarize)
  # See scripts/dist-mac-signed.sh, which sources .env.signing.local (gitignored).
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
  target:
    - dmg
    - zip

# Preserve the orcha:// deep-link protocol the widget uses to open the app.
protocols:
  - name: Orcha
    schemes:
      - orcha

dmg:
  # Standard drag-to-Applications layout.
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
