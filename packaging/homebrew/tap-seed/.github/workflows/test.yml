name: tap-ci

on:
  pull_request:
  push:
    branches: [main]

# Global group (not per-ref): jobs mutate machine-global brew state (Taps tree
# symlink + installed orcha keg) and the self-hosted pool runs multiple runners
# per machine — concurrent tap-ci jobs would race. Traffic is tiny; serialize.
concurrency:
  group: tap-ci
  cancel-in-progress: false

jobs:
  audit-and-install:
    # Self-hosted Mac pool (same as the main repo): has brew, and its SSH key
    # can read the private source repo — required because the formula's
    # `url` is git-over-SSH.
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Expose this checkout as the tap
        # brew only audits/installs formulae that live inside a tap directory,
        # so symlink the checkout into brew's Taps tree for the duration.
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/open-orcha/homebrew-orcha"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Audit
        # plain audit (not --strict): --strict rejects non-public URLs, and the
        # formula URL is intentionally git-over-SSH while the repo is private.
        run: brew audit --tap open-orcha/orcha || true

      - name: Install from source + smoke test
        run: |
          # Formula/ is owned by the release workflow and only exists after the
          # first vX.Y.Z tag — don't fail the seeded tap's pre-release pushes.
          if ! compgen -G "Formula/*.rb" >/dev/null; then
            echo "no formulae yet — skipping install (first release not cut)"
            exit 0
          fi
          brew install --build-from-source open-orcha/orcha/orcha
          "$(brew --prefix)/bin/orcha" --version

      - name: Clean up
        if: always()
        run: |
          brew uninstall --force orcha || true
          TAP_DIR="$(brew --repository)/Library/Taps/open-orcha/homebrew-orcha"
          [ -L "$TAP_DIR" ] && rm -f "$TAP_DIR" || true
